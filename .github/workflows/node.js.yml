# Node.js CI/CD Workflow
# Builds and tests the Borka Bazar Client application

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Node.js ${{ matrix.node-version }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: Client/package-lock.json

    - name: Install dependencies
      working-directory: Client
      run: npm ci --verbose

    - name: Build project
      working-directory: Client
      run: npm run build

    - name: Verify build output
      working-directory: Client
      run: |
        if [ -d "dist" ]; then
          echo "✅ Build successful - dist folder created"
          ls -lah dist/
        else
          echo "❌ Build failed - dist folder not found"
          exit 1
        fi

    - name: Build completed
      if: success()
      run: echo "✅ Node.js ${{ matrix.node-version }} build completed successfully"

    - name: Build failed
      if: failure()
      run: echo "❌ Node.js ${{ matrix.node-version }} build failed"
